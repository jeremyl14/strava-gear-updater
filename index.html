<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gear and Distance Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .panel {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .panel h1 {
            margin: 0 0 10px;
        }
        .panel p {
            margin: 5px 0;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <!-- The web panel will be inserted here by main.js -->
    <script src="main.js"></script>
</body>
</html>
